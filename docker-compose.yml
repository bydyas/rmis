services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
      POSTGRES_DB: test
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
      DB_HOST: db
      DB_PORT: 5432
      DB_USERNAME: root
      DB_PASSWORD: root
      DB_DATABASE: test
      JWT_SECRET: change-me-in-production
      JWT_EXPIRATION: 900000
      ACCESS_TOKEN_NAME: access-token
      COOKIE_HTTP_ONLY: true
      COOKIE_PATH: /
      COOKIE_SAME_SITE: strict
      COOKIE_SECURE: false
      COOKIE_MAX_AGE: 900000
    ports:
      - "${PORT:-3000}:3000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
